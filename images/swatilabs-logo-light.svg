<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 180" width="620" height="180">
  <defs>
    <linearGradient id="labsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c63ff"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c63ff"/>
      <stop offset="100%" style="stop-color:#00d4aa"/>
    </linearGradient>
  </defs>

  <!-- white background -->
  <rect width="620" height="180" rx="16" fill="#ffffff"/>

  <!-- icon: < / > -->
  <g transform="translate(24, 54)">
    <polyline points="38,0 6,36 38,72"  stroke="#6c63ff"      stroke-width="9" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <line     x1="56" y1="2" x2="26" y2="70"                  stroke="url(#iconGrad)" stroke-width="9" stroke-linecap="round"/>
    <polyline points="46,0 78,36 46,72" stroke="#00d4aa"       stroke-width="9" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- wordmark -->
  <text x="130" y="128"
    font-family="Inter, Arial, sans-serif"
    font-size="90" font-weight="800" letter-spacing="-3"
    fill="#0f1115">Swati</text>

  <text x="365" y="128"
    font-family="Inter, Arial, sans-serif"
    font-size="90" font-weight="800" letter-spacing="-3"
    fill="url(#labsGrad)">Labs</text>
</svg>
